<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustACrate - Demon List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f111a',
                        darkCard: '#161925',
                        gdPurple: '#a855f7',
                        gdPink: '#ec4899',
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
        }
    </style>
</head>
<body class="bg-[#0f111a] text-gray-100 font-sans transition-colors duration-300 dark:bg-[#0f111a] dark:text-gray-100">

    <header class="sticky top-0 z-40 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-600 p-0.5 shadow-lg">
        <div class="bg-[#161925] px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-br from-pink-500 to-purple-500 p-2 rounded-xl text-white shadow-md">
                    <i class="fas fa-cube text-xl"></i>
                </div>
                <span class="font-bold text-lg tracking-wide">Just a Crate</span>
            </div>
            
            <div class="flex items-center space-x-2">
                <button onclick="toggleLang()" id="langBtn" class="bg-[#222538] hover:bg-[#2c3049] text-sm font-semibold px-3 py-1.5 rounded-full border border-gray-700 transition">EN</button>
                <button onclick="toggleTheme()" class="bg-[#222538] hover:bg-[#2c3049] p-2 rounded-full border border-gray-700 transition">
                    <i id="themeIcon" class="fas fa-moon text-amber-400"></i>
                </button>
                <button onclick="toggleMenu()" class="bg-[#222538] hover:bg-[#2c3049] p-2 rounded-xl border border-gray-700 transition">
                    <i class="fas fa-bars text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="burgerMenu" class="hidden fixed inset-y-0 right-0 w-64 bg-[#161925] z-50 shadow-2xl p-6 border-l border-gray-800 transition-all">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xl gradient-text" id="menuTitle">Навигация</h3>
            <button onclick="toggleMenu()" class="text-gray-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
        </div>
        <nav class="space-y-4">
            <div class="border-b border-gray-800 pb-2">
                <span class="text-gray-400 text-sm block mb-1" id="menuClass">Классический</span>
                <a href="#" class="block font-medium py-1 hover:text-pink-400">Топ Демонов</a>
            </div>
            <div class="border-b border-gray-800 pb-2">
                <span class="text-gray-400 text-sm block mb-1" id="menuLeader">Лидерборды</span>
                <a href="#" class="block font-medium py-1 hover:text-pink-400">Топ Игроков</a>
            </div>
            <div class="pb-2">
                <span class="text-gray-400 text-sm block mb-1" id="menuOther">Прочее</span>
                <a href="#" class="block font-medium py-1 hover:text-pink-400">Инфо / Правила</a>
            </div>
        </nav>
        <div class="flex space-x-4 mt-10 justify-center">
            <a href="https://discord.gg/yourlink" target="_blank" class="bg-[#222538] hover:bg-[#5865F2] hover:text-white p-3 rounded-xl border border-gray-700 transition text-gray-400 text-xl"><i class="fab fa-discord"></i></a>
            <a href="https://youtube.com/yourlink" target="_blank" class="bg-[#222538] hover:bg-[#FF0000] hover:text-white p-3 rounded-xl border border-gray-700 transition text-gray-400 text-xl"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 py-6 pb-24">
        
        <div class="mb-6 space-y-2">
            <div class="bg-[#161925] rounded-xl border border-gray-800 p-3 flex justify-between items-center cursor-pointer hover:border-gray-700">
                <span class="text-sm font-medium text-gray-300" id="searchTypeBtn"><i class="fas fa-search mr-2 text-pink-500"></i><span id="searchTypeText">Обычный поиск</span></span>
                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
            </div>
            <input type="text" id="searchInput" oninput="searchDemons()" placeholder="Поиск демонов по названию..." class="w-full bg-[#161925] border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-gray-200">
        </div>

        <div class="text-center mb-6">
            <h1 class="text-3xl font-black tracking-tight mb-2" id="mainTitle">Топ Демонов</h1>
            <div class="w-16 h-1 gradient-btn mx-auto rounded-full mb-3"></div>
            <p class="text-xs text-gray-400 px-4 leading-relaxed" id="mainDesc">Самые сложные уровни, отсортированные по рейтингу сложности. Нажмите на демона для подробной информации.</p>
        </div>

        <button onclick="refreshList()" class="gradient-btn w-full text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-pink-500/20 hover:opacity-90 active:scale-[0.98] transition flex items-center justify-center space-x-2 mb-6">
            <i class="fas fa-sync-alt" id="refreshIcon"></i>
            <span id="refreshBtnText">Обновить список</span>
        </button>

        <div class="border-2 border-emerald-500/30 bg-emerald-950/20 rounded-xl p-3 text-center mb-6 shadow-sm shadow-emerald-500/5">
            <span class="text-emerald-400 text-sm font-semibold" id="statusText">✓ Список демонов загружен</span>
        </div>

        <div id="demonList" class="space-y-4">
            </div>

    </main>

    <div id="demonModal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-[#161925] border border-gray-800 w-full max-w-md rounded-2xl max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#161925]">
                <span class="text-xs text-gray-400" id="modalBreadcrumb">Главная > Информация</span>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-lg"><i class="fas fa-times"></i></button>
            </div>

            <div class="p-5 space-y-5" id="modalContent">
                </div>
        </div>
    </div>

    <script>
        // ТВОЯ БАЗА ДАННЫХ ДЕМОНОВ (Сюда просто добавляй новые уровни!)
        const demonsData = [
            {
                id: 1,
                title: "WayMos",
                creator: "Hell",
                verifier: "???",
                points: 1000,
                difficulty: "Insane",
                tag1: "Featured",
                tag2: "InsaneDemon",
                img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=60", // Заглушка, можно заменить на скриншот
                ytEmbed: "https://www.youtube.com/embed/W5t0OjGZZBE?si=1lmEsSb6BrXyuzBd", // Ссылка на видео верификации (embed формат!)
                progress: ["Warsagema (64%)"] // Список прошедших (пусто)
            } 
        ];

        let currentLang = 'RU';

        // Переводы текстов
        const langPack = {
            RU: {
                mainTitle: "Топ Демонов",
                mainDesc: "Самые сложные уровни, отсортированные по рейтингу сложности. Нажмите на демона для подробной информации.",
                refreshBtn: "Обновить список",
                statusLoaded: "✓ Список демонов загружен",
                statusRefreshing: "⏳ Обновление списка...",
                searchPlaceholder: "Поиск демонов по названию...",
                searchType: "Обычный поиск",
                by: "by",
                creator: "Создатель",
                points: "Очки за 100%",
                progCount: "Игроков с прогрессом",
                noProg: "Пока никто не прошел этого демона. Будьте первым!",
                progTitle: "Игроки с прогрессом",
                videoTitle: "Видео верификация",
                videoEmpty: "Видео недоступно",
                officialVer: "Официальная верификация",
                officialVerDesc: "Это официальное видео подтверждение прохождения демона.",
                modalBack: "Главная > ",
                updateData: "Обновить данные демона",
                menuTitle: "Навигация",
                menuClass: "Классический",
                menuLeader: "Лидерборды",
                menuOther: "Прочее"
            },
            EN: {
                mainTitle: "Top Demons",
                mainDesc: "The most difficult levels, sorted by difficulty rating. Click on a demon for detailed information.",
                refreshBtn: "Refresh List",
                statusLoaded: "✓ Demon list loaded",
                statusRefreshing: "⏳ Refreshing list...",
                searchPlaceholder: "Search demons by name...",
                searchType: "Normal search",
                by: "by",
                creator: "Creator",
                points: "Points for 100%",
                progCount: "Players with progress",
                noProg: "Nobody has beaten this demon yet. Be the first!",
                progTitle: "Players with progress",
                videoTitle: "Video Verification",
                videoEmpty: "Video unavailable",
                officialVer: "Official Verification",
                officialVerDesc: "This is the official video proof of the demon completion.",
                modalBack: "Home > ",
                updateData: "Update Demon Data",
                menuTitle: "Navigation",
                menuClass: "Classical",
                menuLeader: "Leaderboards",
                menuOther: "Other"
            }
        };

        // РЕНДЕР КАРТОЧЕК ДЕМОНОВ
        function renderDemons(list = demonsData) {
            const container = document.getElementById('demonList');
            container.innerHTML = '';

            list.forEach((demon, index) => {
                const card = document.createElement('div');
                card.className = "bg-[#161925] border border-gray-800 rounded-2xl p-4 flex items-center space-x-4 cursor-pointer hover:border-purple-500/50 hover:shadow-lg hover:shadow-purple-500/5 active:scale-[0.99] transition";
                card.onclick = () => openModal(demon);

                card.innerHTML = `
                    <div class="bg-[#222538] border border-gray-700 font-bold rounded-xl w-10 h-10 flex items-center justify-center text-gray-300 text-sm shrink-0">
                        ${index + 1}
                    </div>
                    <img src="${demon.img}" class="w-16 h-10 object-cover rounded-lg bg-gray-800 shrink-0 border border-gray-800" alt="">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-base text-gray-100 truncate">${demon.title}</h4>
                        <p class="text-xs text-gray-400 truncate">${langPack[currentLang].by} ${demon.creator}</p>
                        <div class="flex flex-wrap gap-1 mt-1.5">
                            <span class="bg-purple-950/40 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded border border-purple-500/20">${demon.difficulty}</span>
                            <span class="bg-indigo-950/40 text-indigo-400 text-[10px] font-bold px-2 py-0.5 rounded border border-indigo-500/20">${demon.tag1}</span>
                            <span class="bg-pink-950/40 text-pink-400 text-[10px] font-bold px-2 py-0.5 rounded border border-pink-500/20">${demon.tag2}</span>
                        </div>
                    </div>
                    <div class="text-right shrink-0">
                        <span class="text-emerald-400 font-black text-base">${demon.points}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ОТКРЫТИЕ МОДАЛКИ С ДАННЫМИ ДЕМОНА
        function openModal(demon) {
            const modal = document.getElementById('demonModal');
            document.getElementById('modalBreadcrumb').innerText = langPack[currentLang].modalBack + demon.title;
            
            let videoBlock = demon.ytEmbed 
                ? `<iframe class="w-full h-48 rounded-xl border border-gray-800" src="${demon.ytEmbed}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
                : `<div class="w-full h-36 bg-[#222538] border border-gray-800 rounded-xl flex flex-col items-center justify-center text-gray-500 text-sm"><i class="fas fa-exclamation-circle text-2xl mb-2"></i>${langPack[currentLang].videoEmpty}</div>`;

            let progressHTML = '';
            if (demon.progress.length === 0) {
                progressHTML = `
                    <div class="border border-dashed border-gray-800 rounded-xl p-6 text-center">
                        <span class="text-4xl block mb-2">😔</span>
                        <p class="text-xs text-gray-400 font-medium">${langPack[currentLang].noProg}</p>
                    </div>
                `;
            } else {
                progressHTML = `<ul class="space-y-2">` + demon.progress.map(p => `<li class="bg-[#222538] px-3 py-2 rounded-lg text-xs font-semibold border border-gray-800 flex justify-between"><span>🥇 ${p.split(' ')[0]}</span> <span class="text-emerald-400">${p.split(' ')[1] || '100%'}</span></li>`).join('') + `</ul>`;
            }

            document.getElementById('modalContent').innerHTML = `
                <div class="text-center space-y-1">
                    <h2 class="text-2xl font-black gradient-text">${demon.title}</h2>
                    <p class="text-xs text-gray-400">Сложный демон уровня в Geometry Dash</p>
                </div>

                <div class="grid grid-cols-1 gap-2">
                    <div class="bg-[#222538] border border-gray-800 p-3 rounded-xl text-center">
                        <span class="text-emerald-400 font-bold text-lg block">${demon.creator}</span>
                        <span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">${langPack[currentLang].creator}</span>
                    </div>
                    <div class="bg-[#222538] border border-gray-800 p-3 rounded-xl text-center">
                        <span class="text-emerald-400 font-bold text-lg block">${demon.points}</span>
                        <span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">${langPack[currentLang].points}</span>
                    </div>
                    <div class="bg-[#222538] border border-gray-800 p-3 rounded-xl text-center">
                        <span class="text-emerald-400 font-bold text-lg block">${demon.progress.length}</span>
                        <span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">${langPack[currentLang].progCount}</span>
                    </div>
                </div>

                <button class="gradient-btn w-full text-white font-bold py-2 rounded-xl text-xs shadow-md shadow-pink-500/10 hover:opacity-90 active:scale-[0.98] transition">
                    <i class="fas fa-sync-alt mr-1"></i> ${langPack[currentLang].updateData}
                </button>

                <div class="space-y-2">
                    <h3 class="text-sm font-bold flex items-center"><i class="fas fa-video mr-2 text-pink-500"></i> ${langPack[currentLang].videoTitle}</h3>
                    ${videoBlock}
                    <div class="flex gap-1.5 flex-wrap pt-1">
                        <span class="bg-[#222538] border border-gray-800 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded">${demon.difficulty}</span>
                        <span class="bg-[#222538] border border-gray-800 text-indigo-400 text-[10px] font-bold px-2 py-0.5 rounded">${demon.tag1}</span>
                        <span class="bg-[#222538] border border-gray-800 text-pink-400 text-[10px] font-bold px-2 py-0.5 rounded">${demon.tag2}</span>
                    </div>
                    <div class="border-l-4 border-emerald-500 bg-emerald-950/10 p-3 rounded-r-xl mt-2">
                        <h4 class="text-xs font-bold text-emerald-400 mb-0.5">ℹ ${langPack[currentLang].officialVer}</h4>
                        <p class="text-[11px] text-gray-400">${langPack[currentLang].officialVerDesc}</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <h3 class="text-sm font-bold flex items-center"><i class="fas fa-trophy mr-2 text-amber-500"></i> ${langPack[currentLang].progTitle}</h3>
                    ${progressHTML}
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('demonModal').classList.add('hidden');
        }

        // БУРГЕР МЕНЮ
        function toggleMenu() {
            const menu = document.getElementById('burgerMenu');
            menu.classList.toggle('hidden');
        }

        // ПОИСК
        function searchDemons() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = demonsData.filter(d => d.title.toLowerCase().includes(query) || d.creator.toLowerCase().includes(query));
            renderDemons(filtered);
        }

        // КНОПКА ОБНОВИТЬ (Имитация перезагрузки)
        function refreshList() {
            const icon = document.getElementById('refreshIcon');
            const status = document.getElementById('statusText');
            const btnText = document.getElementById('refreshBtnText');
            
            icon.classList.add('fa-spin');
            status.innerText = langPack[currentLang].statusRefreshing;
            status.parentElement.classList.replace('border-emerald-500/30', 'border-amber-500/30');
            status.parentElement.classList.replace('text-emerald-400', 'text-amber-400');

            setTimeout(() => {
                icon.classList.remove('fa-spin');
                status.innerText = langPack[currentLang].statusLoaded;
                status.parentElement.classList.replace('border-amber-500/30', 'border-emerald-500/30');
                renderDemons();
            }, 800);
        }

        // ПЕРЕКЛЮЧЕНИЕ СВЕТЛОЙ/ТЕМНОЙ ТЕМЫ
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('dark');
            
            // Поскольку у нас кастомный темный бэкграунд, меняем классы вручную
            if(body.classList.contains('dark')) {
                body.style.backgroundColor = "#0f111a";
                icon.className = "fas fa-moon text-amber-400";
            } else {
                body.style.backgroundColor = "#f3f4f6"; // Светлый фон
                icon.className = "fas fa-sun text-orange-500";
            }
        }

        // СМЕНА ЯЗЫКА (RU / EN)
        function toggleLang() {
            currentLang = currentLang === 'RU' ? 'EN' : 'RU';
            document.getElementById('langBtn').innerText = currentLang === 'RU' ? 'EN' : 'RU';
            
            // Обновляем весь интерфейс под язык
            document.getElementById('mainTitle').innerText = langPack[currentLang].mainTitle;
            document.getElementById('mainDesc').innerText = langPack[currentLang].mainDesc;
            document.getElementById('refreshBtnText').innerText = langPack[currentLang].refreshBtn;
            document.getElementById('statusText').innerText = langPack[currentLang].statusLoaded;
            document.getElementById('searchInput').placeholder = langPack[currentLang].searchPlaceholder;
            document.getElementById('searchTypeText').innerText = langPack[currentLang].searchType;
            
            document.getElementById('menuTitle').innerText = langPack[currentLang].menuTitle;
            document.getElementById('menuClass').innerText = langPack[currentLang].menuClass;
            document.getElementById('menuLeader').innerText = langPack[currentLang].menuLeader;
            document.getElementById('menuOther').innerText = langPack[currentLang].menuOther;

            renderDemons();
        }

        // Первая загрузка
        renderDemons();
    </script>
</body>
</html>
